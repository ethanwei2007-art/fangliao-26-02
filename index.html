<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>枋寮回憶：無限星空 5.6</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&family=Noto+Serif+TC:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.11.1/baguetteBox.min.css">
    
    <style>
        :root { 
            /* 回歸：對比更明顯的四色暗調配方 */
            --bg-1: #080a15; /* 深邃藍 */
            --bg-2: #180812; /* 暗紫紅 */
            --bg-3: #081810; /* 墨綠 */
            --bg-4: #151208; /* 暗琥珀 */
            --card-w: clamp(175px, 42vw, 240px);
            --card-radius: 22px; 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; font-family: 'Inter', -apple-system, sans-serif;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
        }

        /* 背景：強化的四色律動漸變 */
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, var(--bg-1), var(--bg-2), var(--bg-3), var(--bg-4));
            background-size: 300% 300%; 
            animation: gradientBG 10s ease infinite; /* 縮短時間，增加變色感 */
            z-index: -1;
        }

        /* 探照燈特效 (電腦版) */
        #cursor-glow {
            position: fixed; top: 0; left: 0; width: 700px; height: 700px;
            background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%; pointer-events: none; z-index: 0; transform: translate(-50%, -50%);
            will-change: left, top;
        }

        #universe { position: absolute; width: 100%; height: 100%; z-index: 1; perspective: 2000px; }

        .photo-card { position: absolute; width: var(--card-w); height: var(--card-w); opacity: 0; will-change: transform; cursor: pointer; }
        .photo-card.reveal { opacity: 1; transition: opacity 1.5s ease; }
        .card-front-thumb { 
            width: 100%; height: 100%; object-fit: cover; border-radius: var(--card-radius); 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); border: 0.5px solid rgba(255,255,255,0.1); 
            filter: brightness(0.85); transition: 0.5s cubic-bezier(0.165, 0.84, 0.44, 1); 
        }
        .photo-card:hover .card-front-thumb { filter: brightness(1.1); transform: scale(1.06); border-color: rgba(255,255,255,0.4); }

        /* 啟動層：維持巨型按鈕 */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; justify-content: center; align-items: center; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }
        #start-overlay.fade-out { opacity: 0; visibility: hidden; }
        #start-btn { 
            background: rgba(255,255,255,0.1); border: 2.5px solid rgba(255,255,255,0.7); 
            color: white; padding: 25px 70px; border-radius: 100px; 
            font-size: 1.6rem; letter-spacing: 6px; cursor: pointer; backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(255,255,255,0.15); transition: 0.4s;
        }
        #start-btn:hover { background: #fff; color: #000; transform: scale(1.05); }

        /* 大圖自適應修正 */
        #baguetteBox-overlay .full-image img {
            max-width: 92vw !important; max-height: 82vh !important;
            width: auto !important; height: auto !important; object-fit: contain !important;
        }

        /* 3D 翻轉彩蛋 (隔離渲染版) */
        #secret-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 10000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.5s; }
        #secret-overlay.open { opacity: 1; visibility: visible; }
        .secret-card-container { width: 88vw; max-width: 400px; aspect-ratio: 1/1; perspective: 1800px; }
        .secret-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.85s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .secret-card-container.flipped .secret-card-inner { transform: rotateY(180deg); }
        .secret-front, .secret-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: var(--card-radius); overflow: hidden; }
        .secret-front { z-index: 2; transform: rotateY(0deg); }
        .secret-back { background: #fffdf5; transform: rotateY(180deg); z-index: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; box-sizing: border-box; color: #3d2b1f; text-align: center; }
        .secret-back p { font-family: 'Noto Serif TC', serif; font-size: 1.15rem; line-height: 2; margin: 0; }
        
        .header { position: fixed; top: 7%; width: 100%; text-align: center; color: white; z-index: 100; pointer-events: none; opacity: 0; transition: 3s; }
        .header.reveal { opacity: 0.8; }
        .close-secret { position: absolute; top: 35px; right: 35px; color: white; font-size: 3.5rem; cursor: pointer; z-index: 10001; }
        #previous-button, #next-button { display: none !important; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body>

<div id="bg-canvas"></div>
<div id="cursor-glow"></div>

<div id="start-overlay"><button id="start-btn">進入星空</button></div>

<div id="secret-overlay">
    <div class="close-secret" id="close-secret-btn">&times;</div>
    <div class="secret-card-container" id="secret-card">
        <div class="secret-card-inner">
            <div class="secret-front">
                <img src="fangliao (16).jpg" style="width:100%; height:100%; object-fit:cover;">
                <div style="position:absolute; bottom:20px; width:100%; text-align:center; color:white; font-size:0.9rem; opacity:0.8; text-shadow: 0 2px 5px #000;">✨ 長按或雙擊翻轉</div>
            </div>
            <div class="secret-back">
                <p>嘿嘿被你們發現了！<br>營隊結束了，<br>希望你們還記得我們。<br>台北等你們喔！！</p>
                <div style="margin-top:25px; font-size:0.85rem; color:#8d6e63; font-weight: bold;">By: 小毅 (這個網頁是我做的喔!)</div>
            </div>
        </div>
    </div>
</div>

<div id="header" class="header"><h1>枋寮志工活動錄</h1></div>
<audio id="bgm" src="music.mp3" loop preload="auto"></audio>
<div id="universe"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.11.1/baguetteBox.min.js"></script>
<script>
    const startBtn = document.getElementById('start-btn');
    const overlay = document.getElementById('start-overlay');
    const bgm = document.getElementById('bgm');
    const header = document.getElementById('header');
    const glow = document.getElementById('cursor-glow');
    const secretCard = document.getElementById('secret-card');
    const secretOverlay = document.getElementById('secret-overlay');
    const universe = document.getElementById('universe');
    
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    const totalPhotos = 100;
    const cols = 10;
    const cellSize = isMobile ? 240 : 420; 
    const worldWidth = cols * cellSize;
    const worldHeight = Math.ceil(totalPhotos / cols) * cellSize;
    const photos = [];

    // 啟動監聽
    startBtn.onclick = function() {
        overlay.classList.add('fade-out');
        header.classList.add('reveal');
        bgm.playbackRate = 0.85; 
        bgm.play().catch(() => {});
        photos.forEach((p, index) => {
            setTimeout(() => { p.element.classList.add('reveal'); }, index * 8);
        });
    };

    // 宇宙照片生成
    for (let i = 1; i <= totalPhotos; i++) {
        const isSecret = (i === 16);
        const card = document.createElement(isSecret ? 'div' : 'a');
        card.className = 'photo-card';
        if (!isSecret) card.href = `fangliao (${i}).jpg`;
        const img = document.createElement('img');
        img.src = `fangliao (${i}).jpg`;
        img.className = 'card-front-thumb';
        img.loading = "lazy";
        card.appendChild(img);
        universe.appendChild(card);
        const x = ((i - 1) % cols) * cellSize + (Math.random()-0.5)*50;
        const y = Math.floor((i - 1) / cols) * cellSize + (Math.random()-0.5)*50;
        photos.push({ element: card, x, y });
        if (isSecret) card.onclick = (e) => { e.stopPropagation(); secretOverlay.classList.add('open'); secretCard.classList.remove('flipped'); };
    }

    // 滑鼠探照燈
    window.addEventListener('mousemove', (e) => {
        glow.style.left = e.clientX + 'px';
        glow.style.top = e.clientY + 'px';
    });

    // 渲染循環
    let viewX = 0, viewY = 0, velX = 0.2, velY = 0.1, isDragging = false, lastX, lastY;
    function render() {
        if (!isDragging) { viewX += velX; viewY += velY; velX *= 0.98; velY *= 0.98; }
        const winW = window.innerWidth, winH = window.innerHeight;
        photos.forEach(p => {
            let sx = (p.x + viewX) % worldWidth;
            let sy = (p.y + viewY) % worldHeight;
            if (sx < 0) sx += worldWidth; if (sy < 0) sy += worldHeight;
            p.element.style.transform = `translate3d(${sx - worldWidth/2 + winW/2}px, ${sy - worldHeight/2 + winH/2}px, 0)`;
        });
        requestAnimationFrame(render);
    }
    render();

    // 拖曳控制
    const startDrag = e => { if(e.target.tagName !== 'IMG') { isDragging = true; lastX = e.pageX || e.touches[0].pageX; lastY = e.pageY || e.touches[0].pageY; }};
    const moveDrag = e => { if(!isDragging) return; const x = e.pageX || e.touches[0].pageX, y = e.pageY || e.touches[0].pageY; const dx = x - lastX, dy = y - lastY; viewX += dx; viewY += dy; velX = dx; velY = dy; lastX = x; lastY = y; };
    window.addEventListener('mousedown', startDrag); window.addEventListener('mousemove', moveDrag); window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('touchstart', startDrag, {passive: false}); window.addEventListener('touchmove', moveDrag, {passive: false}); window.addEventListener('touchend', () => isDragging = false);
    
    // 彩蛋控制
    let pressTimer;
    secretCard.ontouchstart = (e) => { e.preventDefault(); pressTimer = setTimeout(() => secretCard.classList.toggle('flipped'), 500); };
    secretCard.ontouchend = () => clearTimeout(pressTimer);
    secretCard.ondblclick = () => secretCard.classList.toggle('flipped');
    document.getElementById('close-secret-btn').onclick = () => secretOverlay.classList.remove('open');
    window.addEventListener('load', () => baguetteBox.run('#universe'));
</script>
</body>
</html>
